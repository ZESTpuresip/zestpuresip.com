<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ZEST Pure Sip</title>
    <style>
        /* Base styles matching the homepage theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333333;
        }

        /* Header Navigation Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 4%;
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .logo .brand-main {
            font-weight: 800;
            font-size: 1.4rem;
            color: #0d2c54;
            letter-spacing: 1px;
        }

        .logo .brand-sub {
            font-size: 0.65rem;
            font-weight: 600;
            color: #8a8a8e;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #555555;
            font-size: 0.85rem;
            font-weight: 500;
            padding-bottom: 5px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #0056b3;
        }

        nav a.active {
            color: #0056b3;
            border-bottom: 2px solid #0056b3;
            font-weight: 600;
        }

        /* Contact Page Layout */
        main {
            padding: 60px 4%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .sub-heading {
            color: #0056b3; 
            font-weight: 600; 
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        h1 {
            color: #0d2c54; 
            font-size: 2.5rem; 
            margin-top: 10px;
            margin-bottom: 40px;
        }

        /* Two-Column Grid: Left (Info Cards), Right (Form) */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
        }

        .info-sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Matching card styling from 1000290444.jpg */
        .contact-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .icon-box {
            font-size: 1.8rem;
        }

        .contact-card h3 {
            color: #0d2c54;
            font-size: 1.1rem;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .contact-card p, .contact-card a {
            color: #555555;
            font-size: 0.95rem;
            line-height: 1.5;
            text-decoration: none;
        }

        .contact-card a:hover {
            color: #0056b3;
        }

        /* Clean Contact Form */
        .contact-form-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #0d2c54;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #0056b3;
        }

        .submit-btn {
            background-color: #0d2c54;
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .submit-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="brand-main">ZEST</span>
            <span class="brand-sub">PURE SIP</span>
        </div>
        <nav>
            <a href="products.html">Our Products</a>
            <a href="why-zest.html">Why ZEST</a>
            <a href="sustainability.html">Sustainability</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <main>
        <span class="sub-heading">Get In Touch</span>
        <h1>We’d Love to Hear From You</h1>

        <div class="contact-container">
            <!-- Left Side: Contact Information Cards -->
            <div class="info-sidebar">
                
                <!-- Phone Card -->
                <div class="contact-card">
                    <div class="icon-box">📞</div>
                    <div>
                        <h3>Call or WhatsApp</h3>
                        <p><a href="tel:+923469355514">+92 346 9355514</a></p>
                    </div>
                </div>

                <!-- Email Card -->
                <div class="contact-card">
                    <div class="icon-box">✉️</div>
                    <div>
                        <h3>Email Us</h3>
                        <p><a href="mailto:zestpuresip@gmail.com">zestpuresip@gmail.com</a></p>
                    </div>
                </div>

                <!-- Location Card -->
                <div class="contact-card">
                    <div class="icon-box">📍</div>
                    <div>
                        <h3>Service Areas</h3>
                        <p>Proudly serving doorstep deliveries across Islamabad and Rawalpindi.</p>
                    </div>
                </div>

            </div>

            <!-- Right Side: Contact Form -->
            <div class="contact-form-card">
                <form action="https://formspree.io/f/zestpuresip@gmail.com" method="POST">
                    <div class="form-group">
                        <label for="name">Your Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone / WhatsApp Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="e.g., 03469355514" required>
                    </div>

                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Islamabad or Rawalpindi" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message / Delivery Request</label>
                        <textarea id="message" name="message" rows="4" placeholder="How can we help you?" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </main>

</body>
</html>
