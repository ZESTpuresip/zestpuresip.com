<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEST Pure Sip</title>
    <style>
        /* Modern Design Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #f0f7fc;
            color: #2c3e50;
            padding: 20px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1. Premium Mobile Card Container */
        .container {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 102, 204, 0.08);
            text-align: center;
        }

        /* Brand Title */
        h1 {
            color: #0066cc;
            font-size: 2rem;
            margin-bottom: 5px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        h2 {
            color: #00b3e6;
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
            font-style: italic;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #5a6b7c;
            margin-bottom: 25px;
        }

        h3 {
            color: #004499;
            font-size: 1.2rem;
            margin-top: 20px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* 2. Beautiful Product Lists */
        .product-list {
            list-style: none;
            padding: 0;
            margin-bottom: 25px;
        }

        .product-list li {
            background: #f4fafe;
            margin: 10px 0;
            padding: 14px 18px;
            border-radius: 14px;
            color: #0066cc;
            font-weight: 600;
            font-size: 1rem;
            border-left: 5px solid #00b3e6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.01);
            text-align: left;
        }

        /* 3. Perfect WhatsApp Button */
        .whatsapp-btn {
            background-color: #25D366;
            color: #ffffff !important;
            padding: 14px 30px;
            text-decoration: none !important;
            font-weight: bold;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.35);
            font-size: 16px;
            margin: 15px 0;
        }

        hr {
            border: 0;
            height: 1px;
            background: #e6f2fa;
            margin: 25px 0;
        }

        .contact-info {
            font-size: 0.95rem;
            color: #657786;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

    <!-- Main Card Container -->
    <div class="container">
        <h1>ZEST Pure Sip</h1>
        <h2>Taste Purity, Feel Zest</h2>
        
        <p>Welcome to ZEST Pure Sip, your trusted source of pure and refreshing drinking water in Islamabad.</p>
        
        <h3>Our Products</h3>
        <ul class="product-list">
            <li>500ml Bottle</li>
            <li>1.5L Bottle</li>
            <li>12L Bottle</li>
            <li>19L Bottle</li>
        </ul>

        <!-- WhatsApp Button -->
        <div>
            <a href="https://wa.me/923469355514?text=I%20want%20to%20order%20ZEST%20Pure%20Sip%20water" 
               target="_blank" 
               class="whatsapp-btn">
               💬 Order via WhatsApp
            </a>
        </div>
        
        <hr>
        
        <h3>Contact</h3>
        <p class="contact-info"><strong>Owner:</strong> Shaukat Khan</p>
        <p class="contact-info">Islamabad, Pakistan</p>
    </div>

</body>
</html>
